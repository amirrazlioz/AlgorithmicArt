<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithmic Art Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            color: #64748b;
            font-size: 1rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            text-align: right;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f1f5f9;
            color: #475569;
        }

        .status-pill {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: #dcfce7;
            color: #166534;
        }

        .btn-view {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-view:hover { opacity: 0.9; }

        canvas {
            max-width: 100%;
        }

        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Algorithmic Art - Dashboard ניהול</h1>
        <div id="last-update" style="color: #94a3b8;">מעדכן נתונים...</div>
    </header>

    <div class="stats-grid">
        <div class="card">
            <div class="stat-label">תלמידים פעילים (10 דק' אחרונות)</div>
            <div id="active-students-count" class="stat-value">0</div>
        </div>
        <div class="card">
            <div class="stat-label">סך הרצות קוד היום</div>
            <div id="total-requests" class="stat-value">0</div>
        </div>
        <div class="card">
            <div class="stat-label">אחוז הצלחה ממוצע</div>
            <div id="success-rate" class="stat-value">0%</div>
        </div>
    </div>

    <div class="main-grid">
        <div class="card">
            <h3>רשימת תלמידים מחוברים</h3>
		<table>
			<thead>
				<tr>
					<th>שם תלמיד</th>
					<th>IP</th>
					<th>הרצות</th> <th>סטטוס</th>
					<th>פעולות</th>
				</tr>
			</thead>
			<tbody id="students-table-body">
				</tbody>
		</table>
        </div>

        <div class="card">
            <h3>ניתוח הצלחה לפי שלב</h3>
            <canvas id="levelsChart"></canvas>
        </div>
    </div>
	
	<button onclick="resetAllData()" style="background-color: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 20px;">
    🗑️ איפוס כל הנתונים
	</button>

</div>

<script>
    let levelsChart;

    async function fetchData() {
        try {
            // החליפי את ה-URL לכתובת השרת שלך במידת הצורך
            const response = await fetch("/api/admin-stats");
            const data = await response.json();

            updateUI(data);
            document.getElementById('last-update').innerText = "עודכן לאחרונה: " + new Date().toLocaleTimeString();
        } catch (error) {
            console.error("שגיאה במשיכת נתונים:", error);
            document.getElementById('last-update').innerText = "שגיאת חיבור לשרת";
        }
    }

	function updateUI(data) {
		const tableBody = document.getElementById('students-table-body');
		if (!tableBody) return;

		tableBody.innerHTML = '';

		const now = Date.now();
		const tenMinutes = 10 * 60 * 1000; // 600,000 מילישניות
		let activeInLast10 = 0;

		if (data.activeStudents) {
			data.activeStudents.forEach(student => {
				// 1. חישוב פעילות ב-10 דקות אחרונות
				const lastSeen = parseInt(student.lastSeen) || 0;
				const isActiveNow = (now - lastSeen) < tenMinutes;
				
				if (isActiveNow) {
					activeInLast10++;
				}

				// 2. פענוח הפירוט של 7 המונים (run1, run2 וכו')
				const details = student.details ? JSON.parse(student.details) : {};
				
				// יצירת תצוגה נקייה למונים (מסודרת לפי סדר השלבים)
				const countersHtml = Object.entries(details)
					.sort() // מסדר לפי run1, run2...
					.map(([key, val]) => `
						<span style="display:inline-block; font-size:0.75em; background:#f1f5f9; color:#475569; 
									 padding:2px 6px; border-radius:4px; margin:2px; border:1px solid #e2e8f0;">
							${key}: <strong>${val}</strong>
						</span>`)
					.join('');

				// 3. יצירת השורה בטבלה
				const row = document.createElement('tr');
				row.innerHTML = `
					<td><strong>${student.name || 'אנונימי'}</strong></td>
					<td><code style="font-size:0.85em; color:#64748b;">${student.ip}</code></td>
					<td>
						<div style="font-weight:bold; font-size:1.1em; color:var(--primary);">${student.runCount || 0}</div>
						<div style="margin-top:5px; display:flex; flex-wrap:wrap;">${countersHtml || '<small style="color:#cbd5e1;">אין הרצות עדיין</small>'}</div>
					</td>
					<td>
						<span class="status-pill" style="background: ${isActiveNow ? '#dcfce7' : '#f1f5f9'}; color: ${isActiveNow ? '#166534' : '#64748b'};">
							${isActiveNow ? '● פעיל' : 'לא פעיל'}
						</span>
					</td>
					<td><button class="btn-view" onclick="viewCode('${student.ip}')">צפה בקוד</button></td>
				`;
				tableBody.appendChild(row);
			});
		}

		// 4. עדכון המונים בתיבות הסטטיסטיקה למעלה
		const activeDisplay = document.getElementById('active-students-count'); // מונה ה-10 דקות
		const totalRequestsDisplay = document.getElementById('total-requests'); // מונה כללי

		if (activeDisplay) activeDisplay.textContent = activeInLast10;
		if (totalRequestsDisplay) totalRequestsDisplay.textContent = data.totalRequests || 0;
	}

		// עדכון המונה הכללי בראש הדף
		// document.getElementById('total-requests').textContent = data.total-runs || 0;
	//}
	
	
    function updateChart(stats) {
        const labels = [...new Set(Object.keys(stats).map(k => k.split('_')[0]))].sort();
        const successData = labels.map(l => stats[l + '_success'] || 0);
        const failData = labels.map(l => stats[l + '_fail'] || 0);

        const ctx = document.getElementById('levelsChart').getContext('2d');
        
        if (levelsChart) {
            levelsChart.destroy();
        }

        levelsChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: 'הצלחה', data: successData, backgroundColor: '#10b981' },
                    { label: 'שגיאה', data: failData, backgroundColor: '#ef4444' }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true, stacked: true },
                    x: { stacked: true }
                }
            }
        });
    }

    function viewCode(ip) {
        alert("תכונה זו דורשת חיבור WebSocket לקבלת הקוד בשידור חי מכתובת: " + ip);
    }
	
	async function resetAllData() {
		if (!confirm("האם אתה בטוח שברצונך למחוק את כל נתוני התלמידים וההרצות? פעולה זו אינה ניתנת לביטול.")) {
			return;
		}

		try {
			const response = await fetch('/api/reset-all', {
				method: 'POST'
			});

			if (response.ok) {
				alert("הנתונים אופסו בהצלחה!");
				// רענון מידי של הנתונים בדף
				fetchStats(); 
			} else {
				alert("שגיאה באיפוס הנתונים.");
			}
		} catch (error) {
			console.error("Error resetting data:", error);
			alert("תקלת תקשורת עם השרת.");
		}
	}

    // הפעלה ראשונית ורענון כל 5 שניות
    fetchData();
    setInterval(fetchData, 5000);
</script>

</body>
</html>
