<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithmic Art Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            color: #64748b;
            font-size: 1rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            text-align: right;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f1f5f9;
            color: #475569;
        }

        .status-pill {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: #dcfce7;
            color: #166534;
        }

        .btn-view {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-view:hover { opacity: 0.9; }

        canvas {
            max-width: 100%;
        }

        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Algorithmic Art - Dashboard</h1>
        <div id="last-update" style="color: #94a3b8;">מעדכן נתונים...</div>
    </header>

    <div class="stats-grid">
        <div class="card">
            <div class="stat-label">תלמידים פעילים (10 דק' אחרונות)</div>
            <div id="active-students-count" class="stat-value">0</div>
        </div>
        <div class="card">
            <div class="stat-label">סך הרצות קוד היום</div>
            <div id="total-requests" class="stat-value">0</div>
        </div>
        <div class="card">
            <div class="stat-label">מדד עניין כיתתי (ממוצע)</div>
            <div id="avg-rating" class="stat-value" style="color: #0ea5e9;">0.0</div>
        </div>
    </div>

    <div class="main-grid">	
		<div class="card">
			<h3>רשימת תלמידים מחוברים</h3>
			<table>
				<thead>
					<tr>
						<th>שם התלמיד</th>
						<th>IP</th>
						<th style="background:#f8fafc;">סוג נתון</th> 
						<th style="text-align:center;">Level 1</th>
						<th style="text-align:center;">Level 2</th>
						<th style="text-align:center;">Level 3</th>
						<th style="text-align:center;">Level 4</th>
						<th style="text-align:center;">Level 5</th>
						<th style="text-align:center;">Level 6</th>
						<th style="text-align:center;">Creative</th>
						<th style="text-align:center; background:#f0f9ff;">ממוצע תלמיד ⭐</th>
						<th style="text-align:center; background:#f1f5f9;">סה"כ</th>
						<th>סטטוס</th>
					</tr>
				</thead>
				
				<tbody id="students-table-body"></tbody>		
				<tfoot style="background-color: #f8fafc; font-weight: bold; border-top: 2px solid #e2e8f0;">
					<tr>
						<td colspan="3" style="text-align: left; padding-left: 15px;">ממוצע כיתתי Rating ⭐</td>
						<td id="avg-run1" style="text-align:center;">-</td>
						<td id="avg-run2" style="text-align:center;">-</td>
						<td id="avg-run3" style="text-align:center;">-</td>
						<td id="avg-run4" style="text-align:center;">-</td>
						<td id="avg-run5" style="text-align:center;">-</td>
						<td id="avg-run6" style="text-align:center;">-</td>
						<td id="avg-run-creative" style="text-align:center;">-</td>
					<td colspan="3"></td> 
					</tr>
				</tfoot>
			</table>
		</div>	
    </div>

    <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button onclick="exportToCSV()" style="background-color: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;">📥 ייצוא ל-Excel</button>
        <button onclick="resetAllData()" style="background-color: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;">🗑️ איפוס נתונים</button>
    </div>
</div>

<script>

    async function fetchData() {
        try {
            // החליפי את ה-URL לכתובת השרת שלך במידת הצורך
            const response = await fetch("/api/admin-stats");
            const data = await response.json();

            updateUI(data);
            document.getElementById('last-update').innerText = "עודכן לאחרונה: " + new Date().toLocaleTimeString();
        } catch (error) {
            console.error("שגיאה במשיכת נתונים:", error);
            document.getElementById('last-update').innerText = "שגיאת חיבור לשרת";
        }
    }
	
	
function updateUI(data) {
    const tableBody = document.getElementById('students-table-body');
    if (!tableBody) return;
    tableBody.innerHTML = '';

    const now = Date.now();
    const tenMinutes = 10 * 60 * 1000;
    const keys = ['run1', 'run2', 'run3', 'run4', 'run5', 'run6', 'run-creative'];
    
    let activeInLast10 = 0;
    let globalRatingSum = 0;
    let globalRatingCount = 0;

    const colTotals = { run1: 0, run2: 0, run3: 0, run4: 0, run5: 0, run6: 0, 'run-creative': 0 };
    const colCounts = { run1: 0, run2: 0, run3: 0, run4: 0, run5: 0, run6: 0, 'run-creative': 0 };

    if (data && data.activeStudents) {
        data.activeStudents.forEach(student => {
            const lastSeen = parseInt(student.lastSeen) || 0;
            const isActiveNow = (now - lastSeen) < tenMinutes;
            if (isActiveNow) activeInLast10++;

            let stats = {}, ratings = {};
            try {
                if (student.details) stats = JSON.parse(student.details);
                if (student.ratingsJson) ratings = JSON.parse(student.ratingsJson);
            } catch (e) { console.error("JSON Error:", e); }

            // חישוב ממוצע אישי
            let sSum = 0, sCount = 0;
            keys.forEach(k => {
                const r = parseInt(ratings[k]) || 0;
                if (r > 0) {
                    sSum += r; sCount++;
                    colTotals[k] += r; colCounts[k]++;
                    globalRatingSum += r; globalRatingCount++;
                }
            });
            const studentAvg = sCount > 0 ? (sSum / sCount).toFixed(1) : "-";

            // --- שורה 1: Runs + סה"כ ---
            const row1 = document.createElement('tr');
            row1.style.borderTop = "2px solid #cbd5e1";
            
            // יצירת תאי ההרצות - פונט מודגש ואחיד
            const runCells = keys.map(k => `
                <td style="text-align:center; font-weight:bold; font-size:1rem; color: #1e293b;">
                    ${stats[k] || 0}
                </td>
            `).join('');

            row1.innerHTML = `
                <td rowspan="2" style="vertical-align:middle; background:#fff; border-left: 1px solid #e2e8f0;">
                    <strong>${student.name || 'אנונימי'}</strong>
                </td>
                <td rowspan="2" style="vertical-align:middle; background:#fff; border-left: 1px solid #e2e8f0;">
                    <code style="font-size:0.85rem;">${student.ip}</code>
                </td>
                <td style="background:#f8fafc; font-weight:bold; font-size:0.9rem; border-left:1px solid #e2e8f0;">Runs</td>
                ${runCells}
                <td style="background:#f0f9ff; text-align:center; font-weight:bold; color:#cbd5e1;">-</td>
                <td style="text-align:center; font-weight:bold; font-size:1rem; background:#f1f5f9; color: #1e293b;">
                    ${student.runCount || 0}
                </td>
                <td rowspan="2" style="vertical-align:middle; text-align:center; background:#fff;">
                    <span class="status-pill" style="
                        display: inline-block;
                        padding: 4px 12px;
                        border-radius: 9999px;
                        font-size: 0.8rem;
                        font-weight: bold;
                        background: ${isActiveNow ? '#dcfce7' : '#f1f5f9'}; 
                        color: ${isActiveNow ? '#166534' : '#64748b'};
                    ">
                        ${isActiveNow ? '● פעיל' : 'לא פעיל'}
                    </span>
                </td>
            `;
            tableBody.appendChild(row1);

            // --- שורה 2: Rating ⭐ + ממוצע ---
            const row2 = document.createElement('tr');
            const ratingCells = keys.map(k => {
                const r = parseInt(ratings[k]) || 0;
                return `
                    <td style="text-align:center; font-weight:bold; font-size:1rem; color:#0ea5e9; background:#fcfcfc;">
                        ${r > 0 ? r : "-"}
                    </td>
                `;
            }).join('');
            
            row2.innerHTML = `
                <td style="background:#f0f9ff; font-weight:bold; font-size:0.9rem; border-left:1px solid #e2e8f0;">Rating ⭐</td>
                ${ratingCells}
                <td style="text-align:center; font-weight:bold; font-size:1rem; background:#f0f9ff; color:#0369a1;">
                    ${studentAvg}
                </td>
                <td style="background:#f1f5f9; text-align:center; font-weight:bold; color:#cbd5e1;">-</td>
            `;
            tableBody.appendChild(row2);
        });
    }

    // --- עדכון ממוצעים כיתתיים ב-tfoot (פונט מודגש ואחיד) ---
    keys.forEach(k => {
        const el = document.getElementById(`avg-${k}`);
        if (el) {
            el.style.fontWeight = "bold";
            el.style.fontSize = "1rem";
            if (colCounts[k] > 0) {
                el.innerText = (colTotals[k] / colCounts[k]).toFixed(1);
            } else {
                el.innerText = "-";
            }
        }
    });

    // --- עדכון מונים בכרטיסיות העליונות ---
    if (document.getElementById('active-students-count')) 
        document.getElementById('active-students-count').textContent = activeInLast10;
    
    if (document.getElementById('total-requests')) 
        document.getElementById('total-requests').textContent = data.totalRequests || 0;
    
    const finalAvg = globalRatingCount > 0 ? (globalRatingSum / globalRatingCount).toFixed(1) : "0.0";
    if (document.getElementById('avg-rating')) 
        document.getElementById('avg-rating').textContent = finalAvg;

    if (document.getElementById('last-update')) 
        document.getElementById('last-update').textContent = "עודכן לאחרונה: " + new Date().toLocaleTimeString();
}
	
	
	
	
	async function resetAllData() {
		if (!confirm("האם אתה בטוח?")) return;

		try {
			const response = await fetch('/api/reset-all', { method: 'POST' });

			if (response.ok) {
				// alert("הנתונים אופסו בהצלחה!");
				
				// הוספת השהיה של חצי שנייה לפני הטעינה מחדש
				setTimeout(() => {
					fetchStats(); 
				}, 500);
				
			} else {
				alert("השרת החזיר שגיאה בניסיון האיפוס.");
			}
		} catch (error) {
			alert("תקלת תקשורת בביצוע האיפוס.");
		}
	}

	async function fetchStats() {
		try {
			const response = await fetch('/api/admin-stats');
			const data = await response.json();
			
			// בדיקה קריטית: אם אין תלמידים (אחרי איפוס), שלח מערך ריק כדי שהקוד לא יקרוס
			if (!data.activeStudents) {
				data.activeStudents = [];
			}
			
			updateUI(data);
		} catch (error) {
			console.error("Fetch error:", error);
			// אל תקפיץ alert כאן אם זה קורה מיד אחרי איפוס, כדי לא להציק למשתמש
			console.log("נתקבלו נתונים ריקים או שגיאת רענון");
		}
	}
	
function exportToCSV() {
    const tableBody = document.getElementById('students-table-body');
    const rows = tableBody.querySelectorAll("tr");
    let csvContent = "\uFEFF"; // BOM לעברית

    // כותרות (ידני כדי להבטיח סדר)
    csvContent += "שם,IP,סוג נתון,Lvl 1,Lvl 2,Lvl 3,Lvl 4,Lvl 5,Lvl 6,Creative,ממוצע,סה\"כ,סטטוס\n";

    for (let i = 0; i < rows.length; i += 2) {
        const rowRuns = rows[i];
        const rowRatings = rows[i + 1];

        if (!rowRuns || !rowRatings) continue;

        // שליפת נתונים משורת ה-Runs
        const name = rowRuns.cells[0].innerText.trim();
        const ip = rowRuns.cells[1].innerText.trim();
        const type1 = rowRuns.cells[2].innerText.trim();
        const runData = Array.from(rowRuns.cells).slice(3, 10).map(c => c.innerText.trim());
        const avgEmpty = "-";
        const total = rowRuns.cells[11].innerText.trim();
        const status = rowRuns.cells[12].innerText.trim();

        csvContent += `"${name}","${ip}","${type1}",${runData.join(",")},"${avgEmpty}","${total}","${status}"\n`;

        // שליפת נתונים משורת ה-Ratings
        // שים לב: בשורה השנייה בגלל ה-rowspan, ה-index של התאים שונה!
        const type2 = rowRatings.cells[0].innerText.trim();
        const ratingData = Array.from(rowRatings.cells).slice(1, 8).map(c => c.innerText.trim());
        const studentAvg = rowRatings.cells[8].innerText.trim();
        const totalEmpty = "-";

        csvContent += `"${name}","${ip}","${type2}",${ratingData.join(",")},"${studentAvg}","${totalEmpty}","${status}"\n`;
    }

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `report_${new Date().toLocaleDateString()}.csv`;
    link.click();
}
	
    // הפעלה ראשונית ורענון כל 5 שניות
    fetchData();
    setInterval(fetchData, 5000);
</script>

</body>
</html>
