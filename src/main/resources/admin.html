<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithmic Art Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            color: #64748b;
            font-size: 1rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            text-align: right;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f1f5f9;
            color: #475569;
        }

        .status-pill {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: #dcfce7;
            color: #166534;
        }

        .btn-view {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-view:hover { opacity: 0.9; }

        canvas {
            max-width: 100%;
        }

        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Algorithmic Art - Dashboard</h1>
        <div id="last-update" style="color: #94a3b8;">מעדכן נתונים...</div>
    </header>

    <div class="stats-grid">
        <div class="card">
            <div class="stat-label">תלמידים פעילים</div>

        </div>
    </div>
	

    <div class="main-grid">	
		<div class="card">

						<th>סטטוס</th>

<script>

    async function fetchData() {
        try {
            // החליפי את ה-URL לכתובת השרת שלך במידת הצורך
            const response = await fetch("/api/admin-stats");
            const data = await response.json();

            updateUI(data);
            document.getElementById('last-update').innerText = "עודכן לאחרונה: " + new Date().toLocaleTimeString();
        } catch (error) {
            console.error("שגיאה במשיכת נתונים:", error);
            document.getElementById('last-update').innerText = "שגיאת חיבור לשרת";
        }
    }

function updateUI(data) {
    console.log("נתונים שהתקבלו:", data);

    // 1. עדכון מונים בזהירות (מניעת שגיאת null שקוטעת את הריצה)
    const totalReqElem = document.getElementById('total-requests');
    if (totalReqElem) {
        totalReqElem.textContent = data.totalRequests || 0;
    }

    const activeUsersElem = document.getElementById('active-users-count');
    if (activeUsersElem) {
        activeUsersElem.textContent = data.activeStudents ? data.activeStudents.length : 0;
    }

    // 2. מציאת הטבלה
    const tableBody = document.getElementById('students-table-body');
    if (!tableBody) {
        console.error("לא נמצא אלמנט students-table-body ב-HTML!");
        return;
    }
    
    tableBody.innerHTML = ''; // ניקוי הטבלה

    // 3. בניית השורות מה-Database
    if (data.activeStudents && data.activeStudents.length > 0) {
        data.activeStudents.forEach(student => {
            const tr = document.createElement('tr');
            
            // עיבוד הדירוגים (ratingsJson) לכוכבים ויזואליים
            let ratingsHtml = '<div style="display: flex; flex-direction: column; gap: 2px;">';
            try {
                // המרה של הטקסט מה-DB לאובייקט JS
                const ratings = JSON.parse(student.ratingsJson || '{}');
                const tasks = Object.keys(ratings).sort();
                
                if (tasks.length === 0) {
                    ratingsHtml += '<span style="color: #94a3b8; font-size: 0.8em;">אין דירוגים</span>';
                } else {
                    tasks.forEach(task => {
                        const stars = '⭐'.repeat(ratings[task]);
                        ratingsHtml += `<div style="font-size: 0.85em;"><b>${task}:</b> ${stars}</div>`;
                    });
                }
            } catch (e) {
                ratingsHtml += '<span style="color: #94a3b8;">-</span>';
            }
            ratingsHtml += '</div>';

            // הזרקת הנתונים לשורה
            tr.innerHTML = `
                <td>
                    <div style="font-weight: 600;">${student.name || 'אורח'}</div>
                    <div style="font-size: 0.75em; color: #64748b; font-family: monospace;">${student.ip}</div>
                </td>
                <td style="text-align: center;">
                    <span style="background: #e0e7ff; color: #4338ca; padding: 3px 8px; border-radius: 10px; font-weight: bold; font-size: 0.9em;">
                        ${student.runCount || 0}
                    </span>
                </td>
                <td>${ratingsHtml}</td>
                <td style="color: #475569; font-size: 0.85em; font-weight: 500;">
                    ${student.lastSeen || 'לא ידוע'}
                </td>
            `;
            tableBody.appendChild(tr);
        });
    } else {
        tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px; color: #64748b;">אין נתונים להצגה</td></tr>';
    }
}

	async function resetAllData() {
		if (!confirm("האם אתה בטוח?")) return;

		try {
			const response = await fetch('/api/reset-all', { method: 'POST' });

			if (response.ok) {
				// alert("הנתונים אופסו בהצלחה!");
				
				// הוספת השהיה של חצי שנייה לפני הטעינה מחדש
				setTimeout(() => {
					fetchStats(); 
				}, 500);
				
			} else {
				alert("השרת החזיר שגיאה בניסיון האיפוס.");
			}
		} catch (error) {
			alert("תקלת תקשורת בביצוע האיפוס.");
		}
	}

	async function fetchStats() {
		try {
			const response = await fetch('/api/admin-stats');
			const data = await response.json();
			
			// בדיקה קריטית: אם אין תלמידים (אחרי איפוס), שלח מערך ריק כדי שהקוד לא יקרוס
			if (!data.activeStudents) {
				data.activeStudents = [];
			}
			
			updateUI(data);
		} catch (error) {
			console.error("Fetch error:", error);
			// אל תקפיץ alert כאן אם זה קורה מיד אחרי איפוס, כדי לא להציק למשתמש
			console.log("נתקבלו נתונים ריקים או שגיאת רענון");
		}
	}
	
function exportToCSV() {
    // 1. שליפת הנתונים מהכרטיסיות העליונות
    const activeStudents = document.getElementById('active-students-count')?.innerText || "0";
    const totalRequests = document.getElementById('total-requests')?.innerText || "0";
    const avgRating = document.getElementById('avg-rating')?.innerText || "0.0";

    // 2. יצירת תוכן ה-CSV עם ה-BOM לעברית
    let csvContent = "\uFEFF"; 
    
    // הוספת שורות סיכום כלליות בראש האקסל
    csvContent += `"סיכום שיעור - Algorithmic Art Studio"\n`;
    csvContent += `"תאריך יצוא:","${new Date().toLocaleString('he-IL')}"\n`;
    csvContent += `"תלמידים פעילים (10 דק אחרונות):","${activeStudents}"\n`;
    csvContent += `"סך הרצות קוד היום:","${totalRequests}"\n`;
    csvContent += `"מדד עניין כיתתי ממוצע:","${avgRating}"\n`;
    csvContent += `\n`; // שורת רווח לפני הטבלה

    // 3. עיבוד הטבלה הקיימת (הלוגיקה המקורית שלך)
    const table = document.querySelector("table");
    const rows = Array.from(table.querySelectorAll("tr"));
    let matrix = []; 

    rows.forEach((row, rowIndex) => {
        if (!matrix[rowIndex]) matrix[rowIndex] = [];
        let colIndex = 0;
        
        Array.from(row.querySelectorAll("th, td")).forEach(cell => {
            while (matrix[rowIndex][colIndex]) colIndex++;

            // ניקוי טקסט ממעברי שורה ותווים מיותרים
            const text = `"${cell.innerText.replace(/(\r\n|\n|\r)/gm, " ").replace(/"/g, '""').trim()}"`;
            const rowspan = parseInt(cell.getAttribute("rowspan")) || 1;
            const colspan = parseInt(cell.getAttribute("colspan")) || 1;

            for (let r = 0; r < rowspan; r++) {
                for (let c = 0; c < colspan; c++) {
                    if (!matrix[rowIndex + r]) matrix[rowIndex + r] = [];
                    matrix[rowIndex + r][colIndex + c] = (r === 0 && c === 0) ? text : '""';
                }
            }
            colIndex += colspan;
        });
    });

    // חיבור המטריצה לטקסט ה-CSV
    csvContent += matrix.map(row => row.join(",")).join("\n");

    // 4. הורדת הקובץ
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    const dateStr = new Date().toLocaleDateString().replace(/\//g, '-');
    link.download = `art_studio_report_${dateStr}.csv`;
    link.click();
}

async function toggleCreative() {
    // 1. שינוי המצב
    isCreativeOpen = !isCreativeOpen;
    
    // 2. מציאת הכפתור לפי ה-ID המדויק
    const btn = document.getElementById('toggle-creative-btn');
    
    if (!btn) {
        console.error("Button with id 'toggle-creative-btn' not found!");
        return;
    }

    try {
        // 3. עדכון השרת
        const response = await fetch('/api/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ creativeEnabled: isCreativeOpen })
        });

        if (response.ok) {
            // 4. עדכון ויזואלי של הכפתור
            btn.textContent = isCreativeOpen ? "🔒 חסום דף יצירתי" : "🔓 פתח דף יצירתי";
            btn.style.backgroundColor = isCreativeOpen ? "#ef4444" : "#10b981";
        }
    } catch (error) {
        console.error('Error:', error);
        // החזרת המצב במידה ונכשל
        isCreativeOpen = !isCreativeOpen;
    }
}
	
    // הפעלה ראשונית ורענון כל 5 שניות
    fetchData();
    setInterval(fetchData, 5000);
</script>

</body>
</html>
