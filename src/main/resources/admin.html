<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithmic Art Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            color: #64748b;
            font-size: 1rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            text-align: right;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f1f5f9;
            color: #475569;
        }

        .status-pill {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: #dcfce7;
            color: #166534;
        }

        .btn-view {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-view:hover { opacity: 0.9; }

        canvas {
            max-width: 100%;
        }

        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Algorithmic Art - Dashboard</h1>
        <div id="last-update" style="color: #94a3b8;">מעדכן נתונים...</div>
    </header>

    <div class="stats-grid">
        <div class="card">
            <div class="stat-label">תלמידים פעילים (10 דק' אחרונות)</div>
            <div id="active-students-count" class="stat-value">0</div>
        </div>
        <div class="card">
            <div class="stat-label">סך הרצות קוד היום</div>
            <div id="total-requests" class="stat-value">0</div>
        </div>
        <div class="card">
            <div class="stat-label">מדד עניין כיתתי (ממוצע)</div>
            <div id="avg-rating" class="stat-value" style="color: #0ea5e9;">0.0</div>
        </div>
    </div>

    <div class="main-grid">
        <div class="card">
            <h3>רשימת תלמידים מחוברים</h3>
			<table>
				<thead>
					<tr>
						<th>שם התלמיד</th>
						<th>IP</th>
						<th style="text-align:center;">Level 1</th>
						<th style="text-align:center;">Level 2</th>
						<th style="text-align:center;">Level 3</th>
						<th style="text-align:center;">Level 4</th>
						<th style="text-align:center;">Level 5</th>
						<th style="text-align:center;">Level 6</th>
						<th style="text-align:center;">Creative</th>
						<th style="text-align:center; background-color: #f0f9ff;">ממוצע תלמיד</th>
						<th style="text-align:center; background-color: #f1f5f9;">סה"כ</th>
						<th>סטטוס</th>
					</tr>
				</thead>
				<tbody id="students-table-body"></tbody>
				<tfoot style="background-color: #f8fafc; font-weight: bold; border-top: 2px solid #e2e8f0;">
					<tr>
						<td colspan="2" style="text-align: left; padding-left: 15px;">ממוצע כיתתי (⭐):</td>
						<td id="avg-run1" style="text-align:center; color: #0369a1;">-</td>
						<td id="avg-run2" style="text-align:center; color: #0369a1;">-</td>
						<td id="avg-run3" style="text-align:center; color: #0369a1;">-</td>
						<td id="avg-run4" style="text-align:center; color: #0369a1;">-</td>
						<td id="avg-run5" style="text-align:center; color: #0369a1;">-</td>
						<td id="avg-run6" style="text-align:center; color: #0369a1;">-</td>
						<td id="avg-run-creative" style="text-align:center; color: #0369a1;">-</td>
						<td colspan="3"></td>
					</tr>
				</tfoot>
			</table>
        </div>
    </div>

    <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button onclick="exportToCSV()" style="background-color: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;">📥 ייצוא ל-Excel</button>
        <button onclick="resetAllData()" style="background-color: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;">🗑️ איפוס נתונים</button>
    </div>
</div>

<script>

    async function fetchData() {
        try {
            // החליפי את ה-URL לכתובת השרת שלך במידת הצורך
            const response = await fetch("/api/admin-stats");
            const data = await response.json();

            updateUI(data);
            document.getElementById('last-update').innerText = "עודכן לאחרונה: " + new Date().toLocaleTimeString();
        } catch (error) {
            console.error("שגיאה במשיכת נתונים:", error);
            document.getElementById('last-update').innerText = "שגיאת חיבור לשרת";
        }
    }
	
	
	function updateUI(data) {
		const tableBody = document.getElementById('students-table-body');
		if (!tableBody) return;
		tableBody.innerHTML = '';

		const now = Date.now();
		const tenMinutes = 10 * 60 * 1000;
		let activeInLast10 = 0;
		
		// משתנים לממוצע כיתתי כללי (לכרטיסייה למעלה)
		let globalRatingSum = 0;
		let globalRatingCount = 0;

		// משתנים לממוצע לכל עמודה (ל-tfoot)
		const keys = ['run1', 'run2', 'run3', 'run4', 'run5', 'run6', 'run-creative'];
		const colTotals = { run1: 0, run2: 0, run3: 0, run4: 0, run5: 0, run6: 0, 'run-creative': 0 };
		const colCounts = { run1: 0, run2: 0, run3: 0, run4: 0, run5: 0, run6: 0, 'run-creative': 0 };

		if (data && data.activeStudents) {
			data.activeStudents.forEach(student => {
				const lastSeen = parseInt(student.lastSeen) || 0;
				const isActiveNow = (now - lastSeen) < tenMinutes;
				if (isActiveNow) activeInLast10++;

				// הגנה על פענוח ה-JSON
				let stats = {};
				let ratings = {};
				try {
					if (student.details) stats = JSON.parse(student.details);
					if (student.ratingsJson) ratings = JSON.parse(student.ratingsJson);
				} catch (e) { console.error("JSON error for IP " + student.ip, e); }

				let studentRatingSum = 0;
				let studentRatingCount = 0;

				const statsCells = keys.map(key => {
					const count = stats[key] || 0;
					const rating = parseInt(ratings[key]) || 0;
					
					if (rating > 0) {
						globalRatingSum += rating;
						globalRatingCount++;
						colTotals[key] += rating;
						colCounts[key]++;
						studentRatingSum += rating;
						studentRatingCount++;
					}

					const ratingHtml = rating > 0 
						? `<div style="margin-top:4px; background:#e0f7fa; color:#006064; font-size:0.75em; padding:1px 6px; border-radius:10px; border:1px solid #b2ebf2; font-weight:bold; display:inline-block;">⭐${rating}</div>` 
						: '<div style="height:18px;"></div>';

					return `<td style="text-align:center; border-left: 1px solid #f1f5f9;">
								<div style="color: ${count ? '#1e293b' : '#cbd5e1'}; font-weight:${count ? 'bold' : 'normal'};">${count}</div>
								${ratingHtml}
							</td>`;
				}).join('');

				const studentAvg = studentRatingCount > 0 ? (studentRatingSum / studentRatingCount).toFixed(1) : "-";

				const row = document.createElement('tr');
				row.innerHTML = `
					<td><strong>${student.name || 'אנונימי'}</strong></td>
					<td><code style="font-size:0.8em;">${student.ip}</code></td>
					${statsCells}
					<td style="text-align:center; font-weight:bold; background-color: #f0f9ff; color: #0369a1;">
						${studentAvg !== "-" ? "⭐ " + studentAvg : "-"}
					</td>
					<td style="text-align:center; font-weight:bold; background-color: #f8fafc;">${student.runCount || 0}</td>
					<td>
						<span class="status-pill" style="background: ${isActiveNow ? '#dcfce7' : '#f1f5f9'}; color: ${isActiveNow ? '#166534' : '#64748b'};">
							${isActiveNow ? '● פעיל' : 'לא פעיל'}
						</span>
					</td>
				`;
				tableBody.appendChild(row);
			});
		}

		// --- עדכון כל המונים בדף (חשוב: מחוץ ללולאת התלמידים!) ---

		// 1. כרטיסיות למעלה
		if (document.getElementById('active-students-count')) 
			document.getElementById('active-students-count').textContent = activeInLast10;
		
		if (document.getElementById('total-requests')) 
			document.getElementById('total-requests').textContent = data.totalRequests || 0;
		
		const avgScore = globalRatingCount > 0 ? (globalRatingSum / globalRatingCount).toFixed(1) : "0.0";
		if (document.getElementById('avg-rating')) 
			document.getElementById('avg-rating').textContent = avgScore;

		// 2. ממוצעים בתחתית הטבלה
		keys.forEach(key => {
			const el = document.getElementById(`avg-${key}`);
			if (el) {
				if (colCounts[key] > 0) {
					const avg = (colTotals[key] / colCounts[key]).toFixed(1);
					el.innerHTML = `<span style="color: #0369a1;">⭐ ${avg}</span>`;
				} else {
					el.innerText = "-";
				}
			}
		});

		if (document.getElementById('last-update')) 
			document.getElementById('last-update').textContent = "עודכן לאחרונה: " + new Date().toLocaleTimeString();
	}
	
	async function resetAllData() {
		if (!confirm("האם אתה בטוח?")) return;

		try {
			const response = await fetch('/api/reset-all', { method: 'POST' });

			if (response.ok) {
				// alert("הנתונים אופסו בהצלחה!");
				
				// הוספת השהיה של חצי שנייה לפני הטעינה מחדש
				setTimeout(() => {
					fetchStats(); 
				}, 500);
				
			} else {
				alert("השרת החזיר שגיאה בניסיון האיפוס.");
			}
		} catch (error) {
			alert("תקלת תקשורת בביצוע האיפוס.");
		}
	}

	async function fetchStats() {
		try {
			const response = await fetch('/api/admin-stats');
			const data = await response.json();
			
			// בדיקה קריטית: אם אין תלמידים (אחרי איפוס), שלח מערך ריק כדי שהקוד לא יקרוס
			if (!data.activeStudents) {
				data.activeStudents = [];
			}
			
			updateUI(data);
		} catch (error) {
			console.error("Fetch error:", error);
			// אל תקפיץ alert כאן אם זה קורה מיד אחרי איפוס, כדי לא להציק למשתמש
			console.log("נתקבלו נתונים ריקים או שגיאת רענון");
		}
	}
	
	function exportToCSV() {
		const rows = document.querySelectorAll("table tr");
		let csvContent = "\uFEFF"; // הוספת BOM כדי ש-Excel יזהה עברית

		rows.forEach((row, index) => {
			const rowData = [];
			const cols = row.querySelectorAll("td, th");
			
			cols.forEach((col, colIndex) => {
				// אנחנו מדלגים על עמודת ה"פעולות" (הכפתור של צפה בקוד)
				if (colIndex < cols.length - 1) {
					let text = col.innerText.replace(/(\r\n|\n|\r)/gm, " ").trim();
					// עוטפים בגרשיים כדי למנוע בעיות עם פסיקים בתוך הטקסט
					rowData.push(`"${text}"`);
				}
			});

			csvContent += rowData.join(",") + "\n";
		});

		// יצירת קישור להורדה
		const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
		const url = URL.createObjectURL(blob);
		const link = document.createElement("a");
		
		const date = new Date().toLocaleDateString().replace(/\//g, '-');
		link.setAttribute("href", url);
		link.setAttribute("download", `דוח_תלמידים_${date}.csv`);
		link.style.visibility = 'hidden';
		
		document.body.appendChild(link);
		link.click();
		document.body.removeChild(link);
	}

    // הפעלה ראשונית ורענון כל 5 שניות
    fetchData();
    setInterval(fetchData, 5000);
</script>

</body>
</html>
