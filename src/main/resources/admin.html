<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithmic Art Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            color: #64748b;
            font-size: 1rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            text-align: right;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f1f5f9;
            color: #475569;
        }

        .status-pill {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: #dcfce7;
            color: #166534;
        }

        .btn-view {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-view:hover { opacity: 0.9; }

        canvas {
            max-width: 100%;
        }

        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Algorithmic Art - Dashboard</h1>
        <div id="last-update" style="color: #94a3b8;">מעדכן נתונים...</div>
    </header>

    <div class="stats-grid">
        <div class="card">
            <div class="stat-label">תלמידים פעילים</div>
            <div id="active-users-count" class="stat-value">0</div>
        </div>
        <div class="card">
            <div class="stat-label">סך הרצות קוד היום</div>
            <div id="total-requests" class="stat-value">0</div>
        </div>
        <div class="card">
            <div class="stat-label">מדד עניין כיתתי (ממוצע) ⭐</div>
            <div id="avg-rating" class="stat-value" style="color: #0ea5e9;">0.0</div>
        </div>
    </div>
	

    <div class="main-grid">	
		<div class="card">
			<h3>רשימת תלמידים מחוברים</h3>
			<table>
				<thead>
					<tr>
						<th>שם התלמיד</th>
						<th>IP</th>
						<th style="background:#f8fafc;">סוג נתון</th> 
						<th style="text-align:center;">Level 1</th>
						<th style="text-align:center;">Level 2</th>
						<th style="text-align:center;">Level 3</th>
						<th style="text-align:center;">Level 4</th>
						<th style="text-align:center;">Level 5</th>
						<th style="text-align:center;">Level 6</th>
						<th style="text-align:center;">Creative</th>
						<th style="text-align:center; background:#f0f9ff;">ממוצע תלמיד ⭐</th>
						<th style="text-align:center; background:#f1f5f9;">סה"כ</th>
						<th>סטטוס</th>
					</tr>
				</thead>
				
				<tbody id="students-table-body"></tbody>		
				<tfoot style="background-color: #f8fafc; font-weight: bold; border-top: 2px solid #e2e8f0;">
					<tr>
						<td colspan="3" style="text-align: left; padding-left: 15px;">ממוצע כיתתי Rating ⭐</td>
						<td id="avg-run1" style="text-align:center;">-</td>
						<td id="avg-run2" style="text-align:center;">-</td>
						<td id="avg-run3" style="text-align:center;">-</td>
						<td id="avg-run4" style="text-align:center;">-</td>
						<td id="avg-run5" style="text-align:center;">-</td>
						<td id="avg-run6" style="text-align:center;">-</td>
						<td id="avg-run-creative" style="text-align:center;">-</td>
						<td colspan="3"></td>
					</tr>
				</tfoot>

			</table>
		</div>	
    </div>

    <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button onclick="exportToCSV()" style="background-color: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;">📥 ייצוא ל-Excel</button>
        <button onclick="resetAllData()" style="background-color: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;">🗑️ איפוס נתונים</button>
		<button id="toggle-creative-btn" onclick="toggleCreative()" style="background-color: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;">🔒 חסום דף יצירתי</button>
	</div>
</div>



<script>

    async function fetchData() {
        try {
            // החליפי את ה-URL לכתובת השרת שלך במידת הצורך
            const response = await fetch("/api/admin-stats");
            const data = await response.json();

            updateUI(data);
            document.getElementById('last-update').innerText = "עודכן לאחרונה: " + new Date().toLocaleTimeString();
        } catch (error) {
            console.error("שגיאה במשיכת נתונים:", error);
            document.getElementById('last-update').innerText = "שגיאת חיבור לשרת";
        }
    }
	
	function updateUI(data) {
    // מונים עבור המדד הכיתתי הכולל
    let globalStarsSum = 0;
    let globalStarsCount = 0;

    // עדכון מונים כלליים בראש הדף
    const totalElem = document.getElementById('total-requests');
    if(totalElem) totalElem.textContent = data.totalRequests || 0;
    
    const countElem = document.getElementById('active-users-count');
    if(countElem) countElem.textContent = data.activeStudents ? data.activeStudents.length : 0;

    const tableBody = document.getElementById('students-table-body');
    if (!tableBody) return;
    tableBody.innerHTML = '';

    const levelKeys = ['run1', 'run2', 'run3', 'run4', 'run5', 'run6', 'run-creative'];
    const classTotals = {};
    levelKeys.forEach(key => classTotals[key] = { sum: 0, count: 0 });

    data.activeStudents.forEach(student => {
        const tr = document.createElement('tr');
        let ratings = {}, runCounts = {};
        try {
            ratings = JSON.parse(student.ratingsJson || '{}');
            runCounts = JSON.parse(student.runCountsJson || '{}');
        } catch(e) { console.error("JSON Parse error"); }

        let levelCellsHtml = '';
        levelKeys.forEach(key => {
            const count = runCounts[key] || 0;
            const starCount = ratings[key] || 0;
            
            if (starCount > 0) {
                // עדכון ממוצע לכל Level (ל-Footer)
                classTotals[key].sum += starCount;
                classTotals[key].count += 1;
                
                // עדכון ממוצע כיתתי כולל (לכרטיסייה למעלה)
                globalStarsSum += starCount;
                globalStarsCount += 1;
            }
            
            levelCellsHtml += `
                <td style="text-align:center; font-size: 0.9em; border-left: 1px solid #f1f5f9;">
                    <div style="font-weight: bold; color: #4f46e5;">${count > 0 ? count : '-'}</div>
                    <div style="margin-top: 4px;">${starCount > 0 ? starCount : ''}</div>
                </td>`;
        });

        const ratingValues = Object.values(ratings).filter(v => v > 0);
        const avg = ratingValues.length > 0 ? (ratingValues.reduce((a, b) => a + b, 0) / ratingValues.length).toFixed(1) : '-';

        tr.innerHTML = `
            <td style="font-weight: bold;">${student.name || 'אורח'}</td>
            <td style="font-family: monospace; font-size: 0.85em; color: #64748b;">${student.ip || '-'}</td>
            <td style="background:#f8fafc; font-weight: bold; color: #64748b; font-size: 0.8em;">
                <div>מספר הרצות</div>
                <div style="margin-top: 10px;">Rating</div>
            </td>
            ${levelCellsHtml}
            <td style="text-align:center; font-weight:bold; background:#f0f9ff;">${avg}</td>
            <td style="text-align:center; font-weight:bold; background:#f1f5f9;">${student.runCount || 0}</td>
            <td style="text-align:center;">
                <span class="status-pill" style="background: #f1f5f9; color: #475569; font-family: monospace; white-space: nowrap; padding: 4px 8px;">
                    ${student.lastSeen || '-'}
                </span>
            </td>
        `;
        tableBody.appendChild(tr);
    });

    // עדכון המדד הכיתתי בכרטיסייה למעלה
    const globalAvgDisplay = document.getElementById('avg-rating');
    if (globalAvgDisplay) {
        const finalGlobalAvg = globalStarsCount > 0 ? (globalStarsSum / globalStarsCount).toFixed(1) : "0.0";
        globalAvgDisplay.textContent = finalGlobalAvg;
    }

    updateClassAverages(classTotals, levelKeys);
}

function updateClassAverages(classTotals, levelKeys) {
    levelKeys.forEach((key) => {
        const avgCell = document.getElementById(`avg-${key}`);
        if (avgCell) {
            const stats = classTotals[key];
            // חישוב הממוצע
            const avg = stats.count > 0 ? (stats.sum / stats.count).toFixed(1) : '-';
            
            // עדכון הטקסט והוספת עיצוב קטן
            avgCell.textContent = avg;
            avgCell.style.color = avg !== '-' ? '#4f46e5' : '#94a3b8';
        }
    });
}	

	async function resetAllData() {
		if (!confirm("האם אתה בטוח?")) return;

		try {
			const response = await fetch('/api/reset-all', { method: 'POST' });

			if (response.ok) {
				// alert("הנתונים אופסו בהצלחה!");
				
				// הוספת השהיה של חצי שנייה לפני הטעינה מחדש
				setTimeout(() => {
					fetchStats(); 
				}, 500);
				
			} else {
				alert("השרת החזיר שגיאה בניסיון האיפוס.");
			}
		} catch (error) {
			alert("תקלת תקשורת בביצוע האיפוס.");
		}
	}

	async function fetchStats() {
		try {
			const response = await fetch('/api/admin-stats');
			const data = await response.json();
			
			// בדיקה קריטית: אם אין תלמידים (אחרי איפוס), שלח מערך ריק כדי שהקוד לא יקרוס
			if (!data.activeStudents) {
				data.activeStudents = [];
			}
			
			updateUI(data);
		} catch (error) {
			console.error("Fetch error:", error);
			// אל תקפיץ alert כאן אם זה קורה מיד אחרי איפוס, כדי לא להציק למשתמש
			console.log("נתקבלו נתונים ריקים או שגיאת רענון");
		}
	}
	
function exportToCSV() {
    // 1. נתונים כלליים מהכרטיסיות
    const activeStudentsCount = document.getElementById('active-users-count')?.innerText || "0";
    const totalRequests = document.getElementById('total-requests')?.innerText || "0";
    const avgRatingGlobal = document.getElementById('avg-rating')?.innerText || "0.0";

    // 2. הכנת כותרות הטבלה
    const levels = ['run1', 'run2', 'run3', 'run4', 'run5', 'run6', 'run-creative'];
    const levelHeaders = ["Level 1", "Level 2", "Level 3", "Level 4", "Level 5", "Level 6", "Creative"];
    
    let csvContent = "\uFEFF"; // BOM לעברית
    csvContent += `"סיכום שיעור - Algorithmic Art Studio"\n`;
    csvContent += `"תאריך יצוא:","${new Date().toLocaleString('he-IL')}"\n`;
    csvContent += `"תלמידים פעילים:","${activeStudentsCount}"\n`;
    csvContent += `"סך הרצות קוד:","${totalRequests}"\n`;
    csvContent += `"מדד עניין כיתתי:","${avgRatingGlobal}"\n\n`;

    // שורת כותרות הטבלה
    csvContent += `שם התלמיד,IP,סוג נתון,${levelHeaders.join(",")},ממוצע תלמיד,סה"כ,סטטוס\n`;

    // 3. שליפת הנתונים מהטבלה הויזואלית בצורה חכמה או מה-Data
    // נשתמש ב-rows של ה-tbody כדי לעבור תלמיד-תלמיד
    const rows = Array.from(document.querySelectorAll("#students-table-body tr"));
    
    // בגלל שכל תלמיד הוא שורה אחת ב-DOM (לפי ה-updateUI שלך), נחלץ ממנה את המידע
    rows.forEach(tr => {
        const cells = tr.querySelectorAll("td");
        if (cells.length < 10) return; // הגנה משורות ריקות

        const name = cells[0].querySelector("div")?.innerText || "אורח";
        const ip = cells[1].querySelector("div")?.innerText || "";
        const studentAvg = cells[cells.length - 3].innerText; // עמודת ממוצע ⭐
        const totalRuns = cells[cells.length - 2].innerText; // עמודת סה"כ
        const status = cells[cells.length - 1].innerText;    // עמודת סטטוס

        // חילוץ נתוני ה-Levels (נמצאים בין אינדקס 3 ל-9)
        let runsData = [];
        let ratingsData = [];

        for (let i = 3; i <= 9; i++) {
            const divs = cells[i].querySelectorAll("div");
            if (divs.length >= 2) {
                runsData.push(divs[0].innerText.trim());    // מספר הרצות
                ratingsData.push(divs[1].innerText.trim());   // Rating
            } else {
                runsData.push("-");
                ratingsData.push("");
            }
        }

        // כתיבת שורת "מספר הרצות"
        csvContent += `"${name}","${ip}","מספר הרצות",${runsData.join(",")},"",${totalRuns},"${status}"\n`;
        // כתיבת שורת "Rating" (שם ו-IP ריקים כדי שיהיה קריא)
        csvContent += `"","","Rating",${ratingsData.join(",")},${studentAvg},"",""\n`;
    });

    // 4. הוספת שורת הממוצע הכיתתי מה-Footer
    const tfoot = document.querySelector("tfoot tr");
    if (tfoot) {
        const footerCells = Array.from(tfoot.querySelectorAll("td"));
        // התא הראשון הוא "ממוצע כיתתי", השאר הם הערכים
        let footerRow = `"ממוצע כיתתי","","Rating"`;
        for (let i = 1; i <= 7; i++) {
            footerRow += `,${footerCells[i]?.innerText || "-"}`;
        }
        csvContent += footerRow + `,"","",""\n`;
    }

    // 5. הורדה
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    const dateStr = new Date().toLocaleDateString().replace(/\//g, '-');
    link.download = `art_studio_report_${dateStr}.csv`;
    link.click();
}	


// הגדרת משתנה גלובלי בתחילת הסקריפט
let creativeEnabledStatus = true; 

// משתנה גלובלי (מחוץ לפונקציה)
let isCreativeOpen = true; 

async function toggleCreative() {
    // 1. שינוי המצב
    isCreativeOpen = !isCreativeOpen;
    
    // 2. מציאת הכפתור לפי ה-ID המדויק
    const btn = document.getElementById('toggle-creative-btn');
    
    if (!btn) {
        console.error("Button with id 'toggle-creative-btn' not found!");
        return;
    }

    try {
        // 3. עדכון השרת
        const response = await fetch('/api/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ creativeEnabled: isCreativeOpen })
        });

        if (response.ok) {
            // 4. עדכון ויזואלי של הכפתור
            btn.textContent = isCreativeOpen ? "🔒 חסום דף יצירתי" : "🔓 פתח דף יצירתי";
            btn.style.backgroundColor = isCreativeOpen ? "#ef4444" : "#10b981";
        }
    } catch (error) {
        console.error('Error:', error);
        // החזרת המצב במידה ונכשל
        isCreativeOpen = !isCreativeOpen;
    }
}
	
    // הפעלה ראשונית ורענון כל 5 שניות
    fetchData();
    setInterval(fetchData, 5000);
</script>
